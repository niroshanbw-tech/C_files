name: Compile C Program

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt update && sudo apt install -y gcc

      - name: Compile main.c
        run: gcc main.c -o main

      - name: Run program
        run: ./main
