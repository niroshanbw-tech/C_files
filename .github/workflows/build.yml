name: Build and Upload C Program

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt update && sudo apt install -y gcc

      - name: Compile main.c
        run: gcc main.c -o main

      - name: Run program (for logs)
        run: ./main

      - name: Upload compiled binary
        uses: actions/upload-artifact@v4
        with:
          name: compiled-program
          path: main
